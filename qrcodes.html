<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>QR Codes — La Tonnellerie</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: white; padding: 16px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px 8px;
      text-align: center;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .table-num {
      font-family: 'Georgia', serif;
      font-size: 22px;
      color: #1a1208;
      line-height: 1;
      margin-bottom: 6px;
    }
    .qr-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 6px;
    }
    .qr-wrap canvas, .qr-wrap img {
      width: 130px !important;
      height: 130px !important;
    }
    .card-msg {
      font-size: 9px;
      color: #888;
      font-style: italic;
      line-height: 1.3;
    }
    @media print {
      body { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="grid" id="grid"></div>
  <script>
    const BASE_URL = "https://amanieuxsas1842-byte.github.io/Restaurant--Tonnellerie/table.html?table=";
    const NUM_TABLES = 35;
    const grid = document.getElementById("grid");

    for (let i = 1; i <= NUM_TABLES; i++) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="table-num">${i}</div>
        <div class="qr-wrap" id="qr-${i}"></div>
        <div class="card-msg">Merci de ne pas<br>vous déconnecter</div>
      `;
      grid.appendChild(card);

      new QRCode(document.getElementById(`qr-${i}`), {
        text: BASE_URL + i,
        width: 130,
        height: 130,
        colorDark: "#1a1208",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }
  </script>
</body>
</html>
