<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Commandes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111009;
      --surface: #1C1A12;
      --surface2: #242118;
      --border: rgba(201,151,58,0.15);
      --gold: #C9973A;
      --gold-light: #E8C06A;
      --green: #2D6A4F;
      --green-light: #52B788;
      --red: #8B1A1A;
      --red-light: #E05050;
      --text: #EDE8DF;
      --text-muted: #7A7060;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }

    /* LOGIN */
    #login-screen { min-height: 100dvh; display: flex; align-items: center; justify-content: center; }
    .login-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 48px 40px; width: min(380px, 92vw); text-align: center;
    }
    .login-brand { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); letter-spacing: 0.08em; margin-bottom: 6px; }
    .login-sub { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 36px; }
    .login-input {
      width: 100%; padding: 12px 16px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 4px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 16px; letter-spacing: 0.1em;
      text-align: center; margin-bottom: 16px; outline: none; transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; padding: 12px; background: var(--gold); color: #1A1208;
      border: none; border-radius: 4px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: background 0.2s;
    }
    .login-btn:hover { background: var(--gold-light); }
    .login-error { margin-top: 14px; font-size: 12px; color: var(--red-light); display: none; }

    /* APP */
    #app { display: none; }
    header {
      padding: 24px 32px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface);
    }
    .header-left { display: flex; align-items: baseline; gap: 16px; }
    .brand { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); letter-spacing: 0.05em; }
    .header-badge {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 2px;
      padding: 4px 12px; font-size: 12px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .stats { display: flex; gap: 20px; }
    .stat { text-align: right; }
    .stat-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
    .stat-value { font-family: 'Playfair Display', serif; font-size: 28px; line-height: 1; }
    .stat-value.red { color: var(--red-light); }
    .stat-value.green { color: var(--green-light); }
    .btn-reset {
      padding: 8px 20px; background: transparent; border: 1px solid var(--border); border-radius: 2px;
      color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 12px;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .btn-reset:hover { border-color: var(--gold); color: var(--gold); }
    main { padding: 32px; max-width: 1100px; margin: 0 auto; }

    /* LÉGENDE */
    .legend {
      display: flex; gap: 20px; margin-bottom: 24px; align-items: center; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .legend-dot.waiting { background: var(--text-muted); }
    .legend-dot.scanning { background: var(--red-light); box-shadow: 0 0 6px var(--red-light); }
    .legend-dot.ready { background: var(--green-light); box-shadow: 0 0 6px var(--green-light); }

    #tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }

    .table-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      padding: 20px 16px 16px; display: flex; flex-direction: column; gap: 12px;
      transition: border-color 0.3s, background 0.3s;
    }
    .table-card.is-scanning { border-color: var(--red-light); background: rgba(139,26,26,0.15); }
    .table-card.is-ready { border-color: var(--green); background: rgba(45,106,79,0.12); }

    .card-top { display: flex; flex-direction: column; gap: 2px; }
    .t-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
    .t-num { font-family: 'Playfair Display', serif; font-size: 40px; line-height: 1; color: var(--text); }
    .is-scanning .t-num { color: var(--red-light); }
    .is-ready .t-num { color: var(--green-light); }

    .card-status { display: flex; align-items: center; gap: 8px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.waiting { background: var(--text-muted); animation: blink 2s ease-in-out infinite; }
    .dot.scanning { background: var(--red-light); box-shadow: 0 0 6px var(--red-light); animation: blink-red 1s ease-in-out infinite; }
    .dot.ready { background: var(--green-light); box-shadow: 0 0 6px var(--green-light); }
    @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes blink-red { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    .status-text { font-size: 12px; color: var(--text-muted); }
    .is-scanning .status-text { color: var(--red-light); }
    .is-ready .status-text { color: var(--green-light); }

    .btn-notify {
      width: 100%; padding: 10px; border: none; border-radius: 2px;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
      background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);
    }
    .is-scanning .btn-notify {
      background: var(--gold); color: #1A1208; border: none;
    }
    .is-scanning .btn-notify:hover { background: var(--gold-light); }
    .is-ready .btn-notify {
      background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);
    }
    .is-ready .btn-notify:hover { border-color: var(--red-light); color: var(--red-light); }

    @media (max-width: 600px) {
      header { padding: 16px; flex-wrap: wrap; gap: 12px; }
      main { padding: 20px 16px; }
      #tables-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .brand { font-size: 16px; }
      .stats { gap: 12px; }
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <div class="login-brand">La Tonnellerie</div>
      <div class="login-sub">Accès cuisine</div>
      <input class="login-input" type="password" id="pwd-input" placeholder="Mot de passe" />
      <button class="login-btn" onclick="checkPassword()">Entrer</button>
      <div class="login-error" id="login-error">Mot de passe incorrect</div>
    </div>
  </div>

  <div id="app">
    <header>
      <div class="header-left">
        <span class="brand">La Tonnellerie</span>
        <span class="header-badge">Cuisine</span>
      </div>
      <div class="header-right">
        <div class="stats">
          <div class="stat">
            <div class="stat-label">En cours</div>
            <div class="stat-value red" id="scanning-count">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Prêtes</div>
            <div class="stat-value green" id="ready-count">0</div>
          </div>
        </div>
        <button class="btn-reset" onclick="resetAll()">Tout réinitialiser</button>
      </div>
    </header>
    <main>
      <div class="legend">
        <div class="legend-item"><span class="legend-dot waiting"></span> En attente</div>
        <div class="legend-item"><span class="legend-dot scanning"></span> Client scanné — en cours de préparation</div>
        <div class="legend-item"><span class="legend-dot ready"></span> Prête à récupérer</div>
      </div>
      <div id="tables-grid"></div>
    </main>
  </div>

  <script>
    const SUPABASE_URL = "https://hbdgobcdfittdnifjodr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_eJXG4Rd9ZVM5LUxQxMX1yA_QF_NjuEs";
    const MOT_DE_PASSE = "TablesLatonnellerie";

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);
    let tablesData = [];

    document.getElementById("pwd-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") checkPassword();
    });

    function checkPassword() {
      const val = document.getElementById("pwd-input").value;
      if (val === MOT_DE_PASSE) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "block";
        init();
      } else {
        document.getElementById("login-error").style.display = "block";
        document.getElementById("pwd-input").value = "";
        document.getElementById("pwd-input").focus();
      }
    }

    async function init() {
      const { data, error } = await db.from("tables").select("*").order("numero");
      if (error) { console.error(error); return; }
      tablesData = data;
      renderGrid(data);

      db.channel("admin-all")
        .on("postgres_changes", { event: "UPDATE", schema: "public", table: "tables" }, (payload) => {
          const idx = tablesData.findIndex(t => t.id === payload.new.id);
          if (idx !== -1) tablesData[idx] = payload.new;
          updateCardUI(payload.new);
          updateCounters();
        })
        .subscribe();
    }

    function renderGrid(tables) {
      const grid = document.getElementById("tables-grid");
      grid.innerHTML = "";
      tables.forEach(t => {
        const card = document.createElement("div");
        card.className = "table-card" + getCardClass(t.status);
        card.id = `card-${t.id}`;
        card.innerHTML = cardHTML(t);
        grid.appendChild(card);
      });
      updateCounters();
    }

    function getCardClass(status) {
      if (status === "scanning") return " is-scanning";
      if (status === "ready") return " is-ready";
      return "";
    }

    function cardHTML(t) {
      const statusLabel = t.status === "scanning" ? "En cours 🍽️" : t.status === "ready" ? "Prête ✓" : "En attente";
      const btnLabel = t.status === "scanning" ? "Marquer prête" : t.status === "ready" ? "Remettre en attente" : "—";
      const nextStatus = t.status === "scanning" ? "ready" : "waiting";
      return `
        <div class="card-top">
          <span class="t-label">Table</span>
          <span class="t-num">${t.numero}</span>
        </div>
        <div class="card-status" id="status-${t.id}">
          <span class="dot ${t.status}"></span>
          <span class="status-text">${statusLabel}</span>
        </div>
        <button class="btn-notify" id="btn-${t.id}" onclick="setStatus(${t.id}, '${nextStatus}')">
          ${btnLabel}
        </button>
      `;
    }

    async function setStatus(id, newStatus) {
      await db.from("tables").update({ status: newStatus }).eq("id", id);
    }

    async function resetAll() {
      await db.from("tables").update({ status: "waiting" }).neq("id", 0);
    }

    function updateCardUI(t) {
      const card = document.getElementById(`card-${t.id}`);
      if (!card) return;
      card.className = "table-card" + getCardClass(t.status);
      card.innerHTML = cardHTML(t);
    }

    function updateCounters() {
      document.getElementById("scanning-count").textContent = tablesData.filter(t => t.status === "scanning").length;
      document.getElementById("ready-count").textContent = tablesData.filter(t => t.status === "ready").length;
    }
  </script>
</body>
</html>
